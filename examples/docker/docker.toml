cli_command = "docker"
cli_new_command = "nudocker"

[[command]]
args = "ps"
flags = [
  { long = "all", short = "a", type = "bool", description = "Show all containers" },
  { long = "filter", short = "f", type = "string", description = "Filter condition" },
  { long = "format", type = "string", description = "Pretty-print using a Go template" },
]
parse_helper = "tabular aligned columns, header row present, headers have spaces (e.g. CONTAINER ID)"
reverse = false

[[command]]
args = "images"
flags = [
  { long = "all", short = "a", type = "bool", description = "Show all images" },
  { long = "filter", short = "f", type = "string", description = "Filter condition" },
]
parse_helper = "tabular aligned columns, header row present, headers have spaces (e.g. IMAGE ID)"
reverse = false

[[command]]
args = "logs"
flags = [
  { long = "follow", short = "f", type = "bool", description = "Follow log output" },
  { long = "tail", short = "n", type = "string", description = "Number of lines to show from end" },
  { long = "timestamps", short = "t", type = "bool", description = "Show timestamps" },
  { long = "since", type = "string", description = "Show logs since timestamp or relative" },
]
positional_args = [
  { name = "container", type = "string", optional = false, description = "Container name or ID" },
]
parse_format = "{level}:{message}"
stderr = true                    # Output comes from stderr, use `complete` to capture
follow_flag = "follow"           # When this bool flag is set, stream raw output instead of parsing
reverse = false
