cli_command = "pip3"
cli_new_command = "nupip"
cli_version = "24.x"

[[command]]
args = "list"
flags = [
  { long = "outdated", short = "o", type = "bool", description = "List outdated packages" },
  { long = "uptodate", short = "u", type = "bool", description = "List uptodate packages" },
  { long = "editable", short = "e", type = "bool", description = "List editable projects" },
  { long = "local", short = "l", type = "bool", description = "Do not list globally-installed packages" },
  { long = "user", type = "bool", description = "Only output packages installed in user-site" },
  { long = "format", type = "string", description = "Output format: columns (default), freeze, or json" },
  { long = "not-required", type = "bool", description = "List packages that are not dependencies of installed packages" },
  { long = "exclude", type = "string", description = "Exclude specified package from the output" },
]
parse_helper = "tabular aligned columns, header row present with dashes separator line"

[[command]]
args = "show"
positional_args = [
  { name = "package", type = "string", optional = false, description = "Package name to show info for" },
]
flags = [
  { long = "files", short = "f", type = "bool", description = "Show the full list of installed files for each package" },
]
parse_helper = "key-value pairs, colon-separated (RFC-compliant mail header format)"

[[command]]
args = "freeze"
flags = [
  { long = "local", short = "l", type = "bool", description = "Do not output globally-installed packages" },
  { long = "user", type = "bool", description = "Only output packages installed in user-site" },
  { long = "all", type = "bool", description = "Do not skip setuptools, pip, wheel" },
  { long = "exclude-editable", type = "bool", description = "Exclude editable package from output" },
  { long = "exclude", type = "string", description = "Exclude specified package from the output" },
]
parse_format = "{package}=={version}"

[[command]]
args = "install"
positional_args = [
  { name = "package", type = "string", optional = false, description = "Package specifier to install" },
]
flags = [
  { long = "requirement", short = "r", type = "string", description = "Install from the given requirements file" },
  { long = "upgrade", short = "U", type = "bool", description = "Upgrade all specified packages to newest version" },
  { long = "no-deps", type = "bool", description = "Don't install package dependencies" },
  { long = "user", type = "bool", description = "Install to the Python user install directory" },
  { long = "force-reinstall", type = "bool", description = "Reinstall all packages even if up-to-date" },
]
parse_helper = "streaming text, do not parse"

[[command]]
args = "check"
parse_helper = "line-oriented text, dependency compatibility check output"
