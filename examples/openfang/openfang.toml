cli_command = "openfang"
cli_new_command = "nufang"
cli_version = ""

[[command]]
args = "status"
parse_helper = "key-value pairs, colon-separated"

[[command]]
args = "agent list"
parse_helper = "line-oriented text, one agent per line"

[[command]]
args = "skill list"
parse_helper = "line-oriented text, one skill per line"

[[command]]
args = "skill search"
positional_args = [
  { name = "query", type = "string", optional = false, description = "Search query string" },
]
parse_helper = "line-oriented text, one result per line"

[[command]]
args = "channel list"
parse_helper = "tabular aligned columns, header row present"

[[command]]
args = "models"
parse_helper = "tabular aligned columns, header row present"

[[command]]
args = "sessions"
parse_helper = "tabular aligned columns, header row present"

[[command]]
args = "logs"
parse_helper = "streaming text, do not parse"

[[command]]
args = "health"
parse_helper = "key-value pairs, colon-separated"

[[command]]
args = "doctor"
parse_helper = "line-oriented text, each line is a diagnostic result"

[[command]]
args = "config show"
parse_helper = "key-value pairs, colon-separated"
