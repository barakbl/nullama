cli_command = "zeroclaw"
cli_new_command = "nuzero"
cli_version = "0.2.0"

[[command]]
args = "status"
parse_helper = "line-oriented text, each line is a status field"
stderr = true

[[command]]
args = "providers"
parse_helper = "tabular aligned columns, header row present, separator line present"
stderr = true

[[command]]
args = "providers-quota"
parse_helper = "tabular aligned columns, header row present"
stderr = true

[[command]]
args = "models list"
flags = [
  { long = "provider", type = "string", description = "Provider name" },
]
parse_helper = "tabular aligned columns, header row present"
stderr = true

[[command]]
args = "models status"
flags = [
  { long = "provider", type = "string", description = "Provider name" },
]
parse_helper = "key-value pairs, colon-separated"
stderr = true

[[command]]
args = "memory list"
flags = [
  { long = "category", type = "string", description = "Filter by category" },
  { long = "limit", type = "string", description = "Max entries to return" },
]
parse_helper = "tabular aligned columns, header row present"
stderr = true

[[command]]
args = "memory stats"
parse_helper = "key-value pairs, colon-separated"
stderr = true

[[command]]
args = "doctor"
parse_helper = "line-oriented text, each line is a diagnostic result"
stderr = true

[[command]]
args = "config"
parse_helper = "key-value pairs, colon-separated"
stderr = true
